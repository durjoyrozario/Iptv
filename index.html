    document.addEventListener("keydown", e => {
      if (e.key === "ArrowUp" || e.key === "ArrowRight") {
        playChannel((currentIndex + 1) % channels.length);
      }

      if (e.key === "ArrowDown" || e.key === "ArrowLeft") {
        playChannel((currentIndex - 1 + channels.length) % channels.length);
      }

      if (e.key === "Enter") {
        toggleSystemUI();
      }

// আপনার আগের playChannel ফাংশনটি এমন হতে হবে:
function playChannel(i) {
  currentIndex = i; // বর্তমান ইনডেক্স আপডেট নিশ্চিত করা

  // ভিডিও সোর্স লোড করা (HLS Logic)
  const url = channels[i].link;
  if (Hls.isSupported()) {
    if (hls) hls.destroy();
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }

  // UI আপডেট (নম্বর ও নাম)
  document.getElementById("uiNumber").textContent = (i + 1).toString().padStart(2, '0');
  document.getElementById("uiName").textContent = channels[i].name;

  // UI দেখানো
  const systemUI = document.getElementById("systemUI");
  systemUI.style.display = "flex";

  // অটো হাইড (৪ সেকেন্ড পর)
  clearTimeout(window.uiTimeout);
  window.uiTimeout = setTimeout(() => {
    systemUI.style.display = "none";
  }, 4000);
}
